<!DOCTYPE html>
<html class="staticrypt-html" lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Visual Computing Group — Restricted Preview</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- keep this gate out of search engines -->
        <meta name="robots" content="noindex, nofollow" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="pragma" content="no-cache" />

        <style>
            :root {
                --vcg-orange: #f70;
                --vcg-green: #789600;
                --vcg-blue: #0762ad;
                --vcg-ink: #1d2733;
                --vcg-muted: #5b6873;
                --vcg-line: #e2e6ea;
                --vcg-bg: #eef1f4;
                --vcg-field: #f4f6f8;
            }

            * { box-sizing: border-box; }

            .staticrypt-html, .staticrypt-body { height: 100%; }

            .staticrypt-body {
                margin: 0;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                color: var(--vcg-ink);
            }

            .staticrypt-content {
                min-height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 32px 16px;
                background:
                    radial-gradient(1200px 600px at 50% -10%, #ffffff 0%, var(--vcg-bg) 70%);
            }

            .staticrypt-card {
                width: 100%;
                max-width: 380px;
                background: #ffffff;
                border: 1px solid var(--vcg-line);
                border-radius: 10px;
                box-shadow: 0 10px 30px rgba(20, 35, 55, 0.08);
                padding: 34px 32px 28px;
                text-align: center;
            }

            .staticrypt-logo {
                height: 64px;
                width: auto;
                margin-bottom: 16px;
            }

            .staticrypt-title {
                margin: 0 0 4px;
                font-size: 1.25rem;
                font-weight: 700;
                letter-spacing: 0.2px;
            }
            .staticrypt-title .o { color: var(--vcg-orange); }
            .staticrypt-title .g { color: var(--vcg-green); }
            .staticrypt-title .b { color: var(--vcg-blue); }

            .staticrypt-instructions {
                margin: 0 0 22px;
                font-size: 0.85rem;
                color: var(--vcg-muted);
                line-height: 1.5;
            }

            .staticrypt-field {
                position: relative;
                margin-bottom: 12px;
                text-align: left;
            }

            .staticrypt-field input {
                width: 100%;
                border: 1px solid var(--vcg-line);
                background: var(--vcg-field);
                border-radius: 7px;
                font-size: 16px;
                padding: 13px 42px 13px 14px;
                outline: 0;
                transition: border-color 0.15s, box-shadow 0.15s;
            }
            .staticrypt-field input:focus {
                border-color: var(--vcg-blue);
                box-shadow: 0 0 0 3px rgba(7, 98, 173, 0.12);
                background: #fff;
            }

            .staticrypt-toggle {
                position: absolute;
                right: 10px;
                top: 50%;
                transform: translateY(-50%);
                width: 22px;
                height: 22px;
                opacity: 0.55;
                cursor: pointer;
            }

            .staticrypt-button {
                width: 100%;
                margin-top: 6px;
                border: 0;
                border-radius: 7px;
                background: var(--vcg-blue);
                color: #fff;
                font-size: 0.95rem;
                font-weight: 600;
                letter-spacing: 0.3px;
                padding: 13px;
                cursor: pointer;
                transition: filter 0.15s;
            }
            .staticrypt-button:hover:not(:disabled) { filter: brightness(1.07); }
            .staticrypt-button:disabled { opacity: 0.55; cursor: not-allowed; }

            .staticrypt-error {
                min-height: 1.1em;
                margin: 14px 0 0;
                font-size: 0.82rem;
                color: #c0392b;
            }

            .staticrypt-foot {
                margin-top: 22px;
                padding-top: 16px;
                border-top: 1px solid var(--vcg-line);
                font-size: 0.72rem;
                color: var(--vcg-muted);
            }

            .hidden { display: none !important; }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .staticrypt-spinner {
                width: 2rem; height: 2rem;
                border: 0.25em solid #c7ccd1;
                border-right-color: transparent;
                border-radius: 50%;
                animation: staticrypt-spin 0.75s linear infinite;
            }
            @keyframes staticrypt-spin { 100% { transform: rotate(360deg); } }
        </style>
    </head>
