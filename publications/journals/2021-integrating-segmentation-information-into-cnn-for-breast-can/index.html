<!DOCTYPE html>
<html class="staticrypt-html" lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Visual Computing Group — Restricted Preview</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- keep this gate out of search engines -->
        <meta name="robots" content="noindex, nofollow" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="pragma" content="no-cache" />

        <style>
            :root {
                --vcg-orange: #f70;
                --vcg-green: #789600;
                --vcg-blue: #0762ad;
                --vcg-ink: #1d2733;
                --vcg-muted: #5b6873;
                --vcg-line: #e2e6ea;
                --vcg-bg: #eef1f4;
                --vcg-field: #f4f6f8;
            }

            * { box-sizing: border-box; }

            .staticrypt-html, .staticrypt-body { height: 100%; }

            .staticrypt-body {
                margin: 0;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                color: var(--vcg-ink);
            }

            .staticrypt-content {
                min-height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 32px 16px;
                background:
                    radial-gradient(1200px 600px at 50% -10%, #ffffff 0%, var(--vcg-bg) 70%);
            }

            .staticrypt-card {
                width: 100%;
                max-width: 380px;
                background: #ffffff;
                border: 1px solid var(--vcg-line);
                border-radius: 10px;
                box-shadow: 0 10px 30px rgba(20, 35, 55, 0.08);
                padding: 34px 32px 28px;
                text-align: center;
            }

            .staticrypt-logo {
                height: 64px;
                width: auto;
                margin-bottom: 16px;
            }

            .staticrypt-title {
                margin: 0 0 4px;
                font-size: 1.25rem;
                font-weight: 700;
                letter-spacing: 0.2px;
            }
            .staticrypt-title .o { color: var(--vcg-orange); }
            .staticrypt-title .g { color: var(--vcg-green); }
            .staticrypt-title .b { color: var(--vcg-blue); }

            .staticrypt-instructions {
                margin: 0 0 22px;
                font-size: 0.85rem;
                color: var(--vcg-muted);
                line-height: 1.5;
            }

            .staticrypt-field {
                position: relative;
                margin-bottom: 12px;
                text-align: left;
            }

            .staticrypt-field input {
                width: 100%;
                border: 1px solid var(--vcg-line);
                background: var(--vcg-field);
                border-radius: 7px;
                font-size: 16px;
                padding: 13px 42px 13px 14px;
                outline: 0;
                transition: border-color 0.15s, box-shadow 0.15s;
            }
            .staticrypt-field input:focus {
                border-color: var(--vcg-blue);
                box-shadow: 0 0 0 3px rgba(7, 98, 173, 0.12);
                background: #fff;
            }

            .staticrypt-toggle {
                position: absolute;
                right: 10px;
                top: 50%;
                transform: translateY(-50%);
                width: 22px;
                height: 22px;
                opacity: 0.55;
                cursor: pointer;
            }

            .staticrypt-button {
                width: 100%;
                margin-top: 6px;
                border: 0;
                border-radius: 7px;
                background: var(--vcg-blue);
                color: #fff;
                font-size: 0.95rem;
                font-weight: 600;
                letter-spacing: 0.3px;
                padding: 13px;
                cursor: pointer;
                transition: filter 0.15s;
            }
            .staticrypt-button:hover:not(:disabled) { filter: brightness(1.07); }
            .staticrypt-button:disabled { opacity: 0.55; cursor: not-allowed; }

            .staticrypt-error {
                min-height: 1.1em;
                margin: 14px 0 0;
                font-size: 0.82rem;
                color: #c0392b;
            }

            .staticrypt-foot {
                margin-top: 22px;
                padding-top: 16px;
                border-top: 1px solid var(--vcg-line);
                font-size: 0.72rem;
                color: var(--vcg-muted);
            }

            .hidden { display: none !important; }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .staticrypt-spinner {
                width: 2rem; height: 2rem;
                border: 0.25em solid #c7ccd1;
                border-right-color: transparent;
                border-radius: 50%;
                animation: staticrypt-spin 0.75s linear infinite;
            }
            @keyframes staticrypt-spin { 100% { transform: rotate(360deg); } }
        </style>
    </head>

                var btn = document.getElementById("staticrypt-submit");
                btn.disabled = true;
                var remaining = seconds;
                btn.textContent = "Try again in " + remaining + "s";
                var t = setInterval(function () {
                    remaining -= 1;
                    if (remaining <= 0) {
                        clearInterval(t);
                        btn.disabled = false;
                        btn.textContent = "Sign in";
                    } else {
                        btn.textContent = "Try again in " + remaining + "s";
                    }
                }, 1000);
            }

            // Per-TAB session sign-in: survives clicking between pages, but is wiped the moment
            // the tab/window is closed (sessionStorage, not localStorage). No long-lived storage.
            var SESSION_KEY = "vcg_session_pass";

            window.onload = async function () {
                var saved = null;
                try { saved = sessionStorage.getItem(SESSION_KEY); } catch (e) {}
                if (saved) {
                    const result = await staticrypt.handleDecryptionOfPage(saved, false);
                    if (result.isSuccessful) return; // already signed in this tab - show page, no prompt
                    try { sessionStorage.removeItem(SESSION_KEY); } catch (e) {}
                }
                document.getElementById("staticrypt_loading").classList.add("hidden");
                document.getElementById("staticrypt_content").classList.remove("hidden");
                document.getElementById("staticrypt-username").focus();
            };

            // toggle password visibility
            const toggleIcon = document.getElementById("staticrypt-toggle");
            const imgSrcEyeOpened = toggleIcon.src;
            const imgSrcEyeClosed =
                "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NDAgNTEyIj48cGF0aCBmaWxsPSIjNTU1IiBkPSJNMzguOCA1LjFDMjguNC0zLjEgMTMuMy0xLjIgNS4xIDkuMlMtMS4yIDM0LjcgOS4yIDQyLjlsNTkyIDQ2NGMxMC40IDguMiAyNS41IDYuMyAzMy43LTQuMXM2LjMtMjUuNS00LjEtMzMuN0w1MjUuNiAzODYuN2MzOS42LTQwLjYgNjYuNC04Ni4xIDc5LjktMTE4LjRjMy4zLTcuOSAzLjMtMTYuNyAwLTI0LjZjLTE0LjktMzUuNy00Ni4yLTg3LjctOTMtMTMxLjFDNDY1LjUgNjguOCA0MDAuOCAzMiAzMjAgMzJjLTY4LjIgMC0xMjUgMjYuMy0xNjkuMyA2MC44TDM4LjggNS4xek0yMjMuMSAxNDkuNUMyNDguNiAxMjYuMiAyODIuNyAxMTIgMzIwIDExMmM3OS41IDAgMTQ0IDY0LjUgMTQ0IDE0NGMwIDI0LjktNi4zIDQ4LjMtMTcuNCA2OC43TDQwOCAyOTQuNWM4LjQtMTkuMyAxMC42LTQxLjQgNC44LTYzLjNjLTExLjEtNDEuNS00Ny44LTY5LjQtODguNi03MS4xYy01LjgtLjItOS4yIDYuMS03LjQgMTEuN2MyLjEgNi40IDMuMyAxMy4yIDMuMyAyMC4zYzAgMTAuMi0yLjQgMTkuOC02LjYgMjguM2wtOTAuMy03MC44ek0zNzMgMzg5LjljLTE2LjQgNi41LTM0LjMgMTAuMS01MyAxMC4xYy03OS41IDAtMTQ0LTY0LjUtMTQ0LTE0NGMwLTYuOSAuNS0xMy42IDEuNC0yMC4yTDgzLjEgMTYxLjVDNjAuMyAxOTEuMiA0NCAyMjAuOCAzNC41IDI0My43Yy0zLjMgNy45LTMuMyAxNi43IDAgMjQuNmMxNC45IDM1LjcgNDYuMiA4Ny43IDkzIDEzMS4xQzE3NC41IDQ0My4yIDIzOS4yIDQ4MCAzMjAgNDgwYzQ3LjggMCA4OS45LTEyLjkgMTI2LjItMzIuNUwzNzMgMzg5Ljl6Ii8+PC9zdmc+";
            toggleIcon.src = imgSrcEyeClosed;
            toggleIcon.addEventListener("click", function () {
                const input = document.getElementById("staticrypt-password");
                if (input.type === "password") {
                    input.type = "text";
                    toggleIcon.src = imgSrcEyeOpened;
                    toggleIcon.alt = templateToggleAltHide;
                } else {
                    input.type = "password";
                    toggleIcon.src = imgSrcEyeClosed;
                    toggleIcon.alt = templateToggleAltShow;
                }
            });

            document.getElementById("staticrypt-form").addEventListener("submit", async function (e) {
                e.preventDefault();
                const errEl = document.getElementById("staticrypt-error");
                errEl.textContent = "";

                // Save for THIS tab only so navigation between pages doesn't re-prompt.
                // Set it before decrypting (the decrypt call replaces the whole document).
                var pass = buildPassphrase();
                try { sessionStorage.setItem(SESSION_KEY, pass); } catch (e) {}

                const { isSuccessful } = await staticrypt.handleDecryptionOfPage(pass, false);

                if (!isSuccessful) {
                    try { sessionStorage.removeItem(SESSION_KEY); } catch (e) {}
                    failCount += 1;
                    errEl.textContent = templateError;
                    document.getElementById("staticrypt-password").value = "";
                    if (failCount >= 5) {
                        lockFor(Math.min(60, (failCount - 4) * 10));
                    }
                }
            });
